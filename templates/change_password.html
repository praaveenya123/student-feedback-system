<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Change Password</title>
  <style>
    body {
      background: linear-gradient(to right, #4B0082, #ADD8E6);
      font-family: Arial, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
    }
    
    /* Navigation Bar */
    ul {
      list-style-type: none;
      margin: 0;
      padding: 0;
      overflow: hidden;
      background-color: #333;
      display: flex;
      justify-content: center;
      width: 100%;
      position: fixed;
      top: 0;
      left: 0;
    }

    ul li {
      display: inline;
    }

    ul li a {
      display: block;
      color: white;
      text-decoration: none;
      padding: 14px 20px;
      font-size: 18px;
    }

    ul li a:hover:not(.active) {
      background-color: #b60e8c;
    }

    .active {
      background-color: #04AA6D;
    }

    .centered {
      background: white;
      padding: 25px;
      border-radius: 10px;
      box-shadow: 0px 0px 10px rgba(0, 0, 0, 0.1);
      width: 350px;
      margin-top: 80px;
    }

    h1 {
      text-align: center;
      color: #333;
    }

    label {
      display: block;
      margin: 10px 0 5px;
      font-weight: bold;
    }

    input {
      width: 100%;
      padding: 10px;
      margin-bottom: 15px;
      border: 1px solid #ccc;
      border-radius: 5px;
      font-size: 16px;
    }

    .password-container {
      position: relative;
    }

    .toggle-password {
      position: absolute;
      right: 10px;
      top: 50%;
      transform: translateY(-50%);
      cursor: pointer;
    }

    input[type="submit"] {
      background-color: #4CAF50;
      color: white;
      border: none;
      cursor: pointer;
      font-size: 18px;
    }

    input[type="submit"]:hover {
      background-color: #45a049;
    }
  </style>
</head>
<body>

  <!-- Conditional Navigation Bar -->
  <ul>
    {% if session.get('role') == 'admin' %}
      <li><a href="{{ url_for('admin_dashboard') }}">Admin Dashboard</a></li>
    {% else %}
      <li><a href="{{ url_for('student_dashboard') }}">Student Dashboard</a></li>
    {% endif %}
  </ul>

  <div class="centered">
    <h1>Change Password</h1>
    <form action="/change_password" method="POST" onsubmit="return validatePassword()">
      
      <label for="old_password">Old Password:</label>
      <div class="password-container">
        <input type="password" id="old_password" name="old_password" required>
        <span class="toggle-password" onclick="togglePassword('old_password')">👁️</span>
      </div>

      <label for="new_password">New Password:</label>
      <div class="password-container">
        <input type="password" id="new_password" name="new_password" required>
        <span class="toggle-password" onclick="togglePassword('new_password')">👁️</span>
      </div>

      <label for="confirm_password">Confirm New Password:</label>
      <div class="password-container">
        <input type="password" id="confirm_password" name="confirm_password" required>
        <span class="toggle-password" onclick="togglePassword('confirm_password')">👁️</span>
      </div>

      <input type="submit" value="Change Password">
    </form>
  </div>

  <script>
    function togglePassword(fieldId) {
      let field = document.getElementById(fieldId);
      field.type = field.type === "password" ? "text" : "password";
    }

    function validatePassword() {
      let newPassword = document.getElementById("new_password").value;
      let confirmPassword = document.getElementById("confirm_password").value;

      if (newPassword !== confirmPassword) {
        alert("Passwords do not match!");
        return false;
      }
      alert("Password changed successfully!");
      return true;
    }
  </script>

</body>
</html>
