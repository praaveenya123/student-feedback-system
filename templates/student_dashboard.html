<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Student Dashboard</title>
  <style>
    /* General Styles */
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      background-color: #85cfe8;
      display: flex; /* Allows sidebar + main content side by side */
    }

    /* Sidebar Styles */
    .sidebar {
      width: 250px;
      height: 100vh;
      background-color: #333;
      color: white;
      padding-top: 20px;
      position: fixed; /* Keeps the sidebar fixed on the left */
    }

    .sidebar h2 {
      text-align: center;
      margin-bottom: 20px;
    }

    .sidebar ul {
      list-style: none;
      padding: 0;
      margin: 0;
    }

    .sidebar ul li {
      border-bottom: 1px solid #555;
    }

    .sidebar ul li a {
      display: block;
      color: white;
      text-decoration: none;
      font-size: 18px;
      padding: 15px;
      text-align: center;
      transition: background-color 0.3s ease;
    }

    .sidebar ul li a:hover {
      background-color: #04AA6D;
      border-radius: 5px;
    }

    .active {
      background-color: #04AA6D;
      border-radius: 5px;
    }

    /* Main Content */
    .main-content {
      margin-left: 250px; /* Matches the .sidebar width */
      flex-grow: 1;
      padding: 20px;
    }

    .card {
      background: linear-gradient(to right, #800080, #4B0082);
      color: white;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0px 4px 10px rgba(0, 0, 0, 0.2);
      max-width: 600px;
      margin: 0 auto;
      text-align: center;
    }

    .title {
      font-family: 'Times New Roman', Times, serif;
      font-size: 38px;
      font-weight: bold;
      margin: bottom 30px;
    }
    .subtitle {
      font-family: 'Times New Roman', Times, serif;
      font-size: 25px;
      font-weight:bold;
      margin: bottom 30px
    }
    
    .description {
      font-family: 'Times New Roman', Times, serif;
      font-size: 25px;
      font-weight:bold;
      margin: bottom 30px
    }

    /* Responsive */
    @media (max-width: 768px) {
      .sidebar {
        width: 100px;
      }

      .sidebar h2 {
        font-size: 16px;
      }

      .sidebar ul li a {
        font-size: 14px;
        padding: 10px;
      }

      .main-content {
        margin-left: 100px;
      }
    }
  </style>
</head>
<body>

  <!-- Sidebar -->
  <div class="sidebar">
    <h2>Student Panel</h2>
    <ul>
      <li><a href="student_dashboard" class="active">Student dashboatd</a></li>
      <li><a href="Show_subjects">📚 Show Subjects</a></li>
      <li><a href="contact">📩 Contact</a></li>
      <li><a href="change_password">🔑 Change Password</a></li>
      <li><a href="logout">🚪 Logout</a></li>
    </ul>
  </div>

  <!-- Main Content -->
  <div class="main-content">
    <div class="card">
      <div class="title">MVGR College of Engineering</div><br>
      <div class="subtitle">Department of Information Technology</div><br>
      <div class="description">Welcome to the Student Feedback System</div><br>
    </div>
  </div>

</body>
</html>
