<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Edit Subject</title>
  <style>
    body {
      background: linear-gradient(to right, #4B0082, #ADD8E6);
      font-family: 'Segoe UI', sans-serif;
      margin: 0;
      padding: 0;
      color: #333;
    }
    /* Navigation Bar */
    nav {
      background-color: #333;
      padding: 10px 20px;
    }
    nav ul {
      list-style: none;
      margin: 0;
      padding: 0;
      display: flex;
      justify-content: center;
    }
    nav ul li {
      margin: 0 10px;
    }
    nav ul li a {
      color: #fff;
      text-decoration: none;
      font-size: 16px;
      padding: 8px 12px;
      border-radius: 4px;
      transition: background-color 0.3s ease;
    }
    nav ul li a:hover,
    nav ul li a.active {
      background-color: #04AA6D;
    }
    /* Main Container */
    .container {
      max-width: 500px;
      margin: 40px auto;
      background: #fff;
      padding: 30px;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
    }
    /* Page Title */
    .container h1 {
      text-align: center;
      margin-bottom: 20px;
      font-family: 'Times New Roman', serif;
      font-size: 32px;
      color: #34c021;
    }
    /* Form Styles */
    form {
      display: flex;
      flex-direction: column;
    }
    form label {
      font-weight: bold;
      margin-bottom: 8px;
    }
    form input[type="text"] {
      padding: 10px;
      font-size: 16px;
      border: 1px solid #ccc;
      border-radius: 4px;
      margin-bottom: 20px;
    }
    form button {
      padding: 12px;
      font-size: 16px;
      border: none;
      border-radius: 4px;
      background-color: #04AA6D;
      color: #fff;
      cursor: pointer;
      transition: background-color 0.3s ease;
    }
    form button:hover {
      background-color: #03905d;
    }
    /* Back Link */
    .back-link {
      text-align: center;
      margin-top: 20px;
    }
    .back-link a {
      color: #04AA6D;
      text-decoration: none;
      font-weight: bold;
    }
    .back-link a:hover {
      text-decoration: underline;
    }
    /* Flash Messages */
    .alert {
      padding: 10px;
      margin-bottom: 20px;
      border-radius: 4px;
      text-align: center;
    }
    .alert-success {
      background-color: #dff0d8;
      color: #3c763d;
    }
    .alert-error {
      background-color: #f2dede;
      color: #a94442;
    }
  </style>
</head>
<body>
  <!-- Navigation Bar -->
  <nav>
    <ul>
      <li><a href="admin_dashboard">Admin Dashboard</a></li>
    </ul>
  </nav>
  <!-- Main Container -->
  <div class="container">
    <!-- Display flashed messages -->
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for category, message in messages %}
          <div class="alert alert-{{ category }}">{{ message }}</div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <h1>Edit Subject</h1>
    <form method="POST">
      <label for="subject_name">New Subject Name</label>
      <input type="text" id="subject_name" name="subject_name" value="{{ subject.name }}" required>
      <button type="submit">Save</button>
    </form>
  </div>
</body>
</html>
