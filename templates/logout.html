<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Logging Out...</title>
  <style>
    /* General Styles */
    body {
      background: linear-gradient(to right, #4B0082, #ADD8E6);
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      text-align: center;
      color: white;
    }
    /* Logout Container */
    .logout-container {
      background: rgba(255, 255, 255, 0.1);
      padding: 40px;
      border-radius: 12px;
      box-shadow: 0px 4px 10px rgba(0, 0, 0, 0.3);
      width: 90%;
      max-width: 400px;
      backdrop-filter: blur(10px);
    }
    .logout-container h1 {
      font-size: 26px;
      margin-bottom: 10px;
    }
    .logout-container p {
      font-size: 16px;
      margin-bottom: 20px;
    }
    /* Logout Button */
    .logout-btn {
      padding: 12px 20px;
      font-size: 18px;
      font-weight: bold;
      color: white;
      background: #ff4c4c;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      transition: 0.3s;
      width: 100%;
    }
    .logout-btn:hover {
      background: #ff1a1a;
    }
    /* Animation */
    @keyframes fadeOut {
      0% { opacity: 1; }
      100% { opacity: 0; }
    }
    
    .fade-out {
      animation: fadeOut 2s ease-in-out forwards;
    }
  </style>
  <script>
    // Automatically add fade-out animation and redirect to homepage (index) after 2 seconds
    setTimeout(function() {
      document.querySelector('.logout-container').classList.add('fade-out');
      setTimeout(function() {
        window.location.href = "/";
      }, 2000);
    }, 2000);

    // Function to redirect immediately when button is clicked
    function redirectToHome() {
      window.location.href = "/";
    }
  </script>
</head>
<body>
  

  <div class="logout-container">
    <h1>Logged Out Successfully</h1>
    <p>Thank you for using the system. You will be redirected to the homepage shortly...</p>
    <button class="logout-btn" onclick="redirectToHome()">Go to Homepage Now</button>
  </div>

</body>
</html>
