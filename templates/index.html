<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Selection</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(to right, #6a11cb, #5f818a);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            color: white;
        }

        .container {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
            text-align: center;
            width: 350px;
        }

        h2 {
            margin-bottom: 20px;
            font-size: 24px;
            font-weight: bold;
            text-transform: uppercase;
        }

        .login-btn {
            display: block;
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        .student-btn {
            background: #28a745;
            color: white;
        }

        .admin-btn {
            background: #dc3545;
            color: white;
        }

        .login-btn:hover {
            opacity: 0.8;
            transform: scale(1.05);
        }

        .icon {
            font-size: 24px;
            margin-right: 10px;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>Welcome! Please Select Login</h2>
        
        <a href="login">
            <button class="login-btn student-btn">
                🎓 Student Login
            </button>
        </a>

        <a href="login">
            <button class="login-btn admin-btn">
                🔑 Admin Login
            </button>
        </a>
    </div>

</body>
</html>
